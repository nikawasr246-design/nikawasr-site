  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Geist', sans-serif;
      background: #08080e;
      color: #d0d4e4;
      overflow-x: hidden;
      min-height: 100vh;
    }
    h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

    .feather {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0% { opacity: 0; transform: translateY(0) rotate(0deg) translateX(0) scale(1); }
      10% { opacity: 0.25; }
      90% { opacity: 0.1; }
      100% { opacity: 0; transform: translateY(100vh) rotate(360deg) translateX(40px) scale(0.8); }
    }

    @keyframes animationIn {
      0% { opacity: 0; transform: translateY(20px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .anim-in { animation: animationIn 0.7s ease-out both; }
    .anim-d1 { animation-delay: 0.05s; }
    .anim-d2 { animation-delay: 0.15s; }
    .anim-d3 { animation-delay: 0.25s; }
    .anim-d4 { animation-delay: 0.35s; }
    .anim-d5 { animation-delay: 0.45s; }
    .anim-d6 { animation-delay: 0.55s; }
    .anim-d7 { animation-delay: 0.65s; }
    .anim-d8 { animation-delay: 0.75s; }
    .anim-d9 { animation-delay: 0.85s; }
    .anim-d10 { animation-delay: 0.95s; }
    .anim-d11 { animation-delay: 1.05s; }
    .anim-d12 { animation-delay: 1.15s; }
    .anim-d13 { animation-delay: 1.25s; }
    .anim-d14 { animation-delay: 1.35s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    .float { animation: float 5s ease-in-out infinite; }

    @keyframes soft-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(80,110,180,0.08), 0 0 80px rgba(80,110,180,0.04); }
      50% { box-shadow: 0 0 60px rgba(80,110,180,0.14), 0 0 120px rgba(80,110,180,0.06); }
    }

    .profile-img {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(120,150,200,0.15);
      animation: soft-glow 4s ease-in-out infinite;
    }

    .social-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 0.875rem;
      padding: 0.875rem 1.125rem;
      display: flex; align-items: center; gap: 0.75rem;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
      color: #c0c4d4;
    }
    .social-card:hover {
      border-color: rgba(100,130,200,0.15);
      background: rgba(255,255,255,0.04);
      transform: translateY(-2px);
    }
    .social-card:active { transform: translateY(0); }
    .social-card .icon-wrap {
      width: 38px; height: 38px;
      border-radius: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.35s ease;
    }
    .social-card:hover .icon-wrap { transform: scale(1.06); }
    .social-card .arrow {
      margin-left: auto;
      opacity: 0;
      transform: translateX(-5px);
      transition: all 0.35s ease;
      color: #6878a0;
    }
    .social-card:hover .arrow {
      opacity: 0.6;
      transform: translateX(0);
    }

    .soft-divider {
      width: 30px; height: 1px;
      background: rgba(100,130,200,0.15);
      border-radius: 99px;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #08080e; }
    ::-webkit-scrollbar-thumb { background: rgba(100,130,200,0.2); border-radius: 99px; }

  <script>
    const fc = document.getElementById('feathers-container');
    function createFeather() {
      const f = document.createElement('div');
      f.classList.add('feather');
      const size = Math.random() * 6 + 3;
      const left = Math.random() * 100;
      const dur = Math.random() * 12 + 14;
      const delay = Math.random() * 8;
      f.style.cssText = `
        left: ${left}%;
        top: -20px;
        width: ${size}px;
        height: ${size * 1.6}px;
        background: rgba(180,190,220,0.3);
        border-radius: 50% 50% 50% 0;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
      `;
      fc.appendChild(f);
      setTimeout(() => f.remove(), (dur + delay) * 1000);
    }
    for (let i = 0; i < 8; i++) createFeather();
    setInterval(() => createFeather(), 3000);
  </script>
